# nginx-cloudflare.conf
# Use this if your domain DNS is proxied through Cloudflare (orange cloud).
# Cloudflare handles SSL termination — nginx only needs to listen on port 80.
# In Cloudflare dashboard: SSL/TLS mode = "Flexible" or "Full"

server {
    listen 80;
    server_name api-quant.indonesiastockanalyst.my.id;

    # Backend API — proxy all traffic to FastAPI (Docker port 8001)
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Increase timeouts for long ML computations
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 60s;

        # SSE support (for /api/chat streaming)
        proxy_buffering    off;
        proxy_cache        off;
    }
}
