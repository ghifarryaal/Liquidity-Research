services:
  backend:
    build: ./backend
    restart: always
    ports:
      - "8001:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - liquidity_net

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=https://quant.indonesiastockanalyst.my.id/api
    restart: always
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://quant.indonesiastockanalyst.my.id/api
      - INTERNAL_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - liquidity_net

networks:
  liquidity_net:
    driver: bridge
