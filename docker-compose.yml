services:
  backend:
    build: ./backend
    restart: always
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - liquidity_net

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=https://quant.indonesiastockanalyst.my.id/api
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=https://quant.indonesiastockanalyst.my.id/api
      - INTERNAL_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - liquidity_net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - liquidity_net

networks:
  liquidity_net:
    driver: bridge
