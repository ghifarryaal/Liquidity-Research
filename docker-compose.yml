services:
  backend:
    build: ./backend
    restart: always
    ports:
      - "8001:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - liquidity_net

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://72.60.74.199:8001
    restart: always
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://72.60.74.199:8001
    depends_on:
      - backend
    networks:
      - liquidity_net

networks:
  liquidity_net:
    driver: bridge
